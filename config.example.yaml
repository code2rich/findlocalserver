# FindLocalServer 配置文件
# 复制为 config.yaml 使用

# 用户自定义服务（补充自动发现的结果）
services:
  - name: "我的后端 API"
    port: 8888
    type: http        # http / database / cache / mq / infra / unknown
    group: "后端服务"

  - name: "本地 MySQL"
    port: 3306
    type: database
    group: "数据库"

# 忽略的端口和进程（不显示）
ignore:
  ports: []
  processes: []

# HTTP 探测设置
http_probe:
  enabled: true
  timeout: 2  # 秒

# 前端自动刷新间隔（秒）
refresh_interval: 30

# 服务监听设置
server:
  host: "0.0.0.0"
  port: 9999
